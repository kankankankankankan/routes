name: Deploy

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout routes repo
        uses: actions/checkout@v4
        with:
          path: routes-src

      - name: Checkout nchnroutes
        uses: actions/checkout@v4
        with:
          repository: kankankankankankan/nchnroutes
          path: nchnroutes

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Generate routes
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p routes/eth0
          cd nchnroutes

          curl -fsSL -o delegated-apnic-latest https://ftp.apnic.net/stats/apnic/delegated-apnic-latest
          curl -fsSL -o chnroutes.txt https://raw.githubusercontent.com/misakaio/chnroutes2/master/chnroutes.txt
          curl -fsSL -o CN.txt https://raw.githubusercontent.com/tmplink/IPDB/refs/heads/main/ipv4/cidr/CN.txt
          curl -fsSL -o chnroutes2.txt https://raw.githubusercontent.com/mayaxcn/china-ip-list/refs/heads/master/chnroute.txt
          curl -fsSL -o china_ip_list_17mon.txt https://raw.githubusercontent.com/17mon/china_ip_list/refs/heads/master/china_ip_list.txt
          curl -fsSL -o chnroute_kankan.txt https://raw.githubusercontent.com/kankankankankankan/china-ip-list/refs/heads/master/chnroute.txt

          cat chnroutes.txt CN.txt chnroutes2.txt china_ip_list_17mon.txt chnroute_kankan.txt \
            | sed 's/#.*$//' \
            | tr -d '\r' \
            | awk '{$1=$1}; NF' \
            | grep -F "." \
            | sort -u \
            > china_ip_list.txt

          EXCLUDES=()
          
          if [[ -f ../routes-src/excludes.txt ]]; then
            while IFS= read -r cidr; do
              [[ -n "$cidr" ]] && EXCLUDES+=("$cidr")
            done < <(
              sed 's/#.*$//' ../routes-src/excludes.txt \
                | tr -d '\r' \
                | awk '{$1=$1}; NF {print $1}'
            )
          fi

          PRODUCE_ARGS=(--next="eth0")
          
          if ((${#EXCLUDES[@]} > 0)); then
            PRODUCE_ARGS=(--exclude "${EXCLUDES[@]}" "${PRODUCE_ARGS[@]}")
          fi

          echo "Produce args:"
          printf '  %q\n' "${PRODUCE_ARGS[@]}"

          python3 produce.py "${PRODUCE_ARGS[@]}"

          mv routes4.conf ../routes/eth0/
          mv routes6.conf ../routes/eth0/

          echo "Generated files:"
          ls -lh ../routes/eth0

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./routes
          publish_branch: gh-pages
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
          full_commit_message: Deploy from ${{ github.repository }}@${{ github.sha }}
